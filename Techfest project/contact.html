<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Contact - ProHardware</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .contact-form {
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .contact-form h2 { margin-bottom: 20px; text-align: center; }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
    }
    .contact-form button {
      width: 100%;
      padding: 14px;
      background-color: #f5a623;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .contact-form button:hover { background-color: #e09415; }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">🔧 ProHardware</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="contact-form">
    <h2>Contact Us</h2>
    <input type="text" placeholder="Your Name" required />
    <input type="email" placeholder="Your Email" required />
    <textarea rows="5" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </div>

  <footer>
    <p>&copy; 2026 ProHardware. All rights reserved.</p>
  </footer>

</body>
</html>
